<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון טריוויה - Skillhub</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Heebo', 'sans-serif'] } } } }
    </script>
    <style>
        body { font-family: 'Heebo', sans-serif; }
        .answer-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="toast" class="hidden fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold z-[100] shadow-2xl transition-all"></div>

    <div id="screen-login" class="flex flex-col items-center justify-center min-h-screen p-4">
        <button onclick="showScreen('adminLogin')" class="absolute top-4 left-4 text-slate-700">⚙️</button>
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700 text-center">
            <h1 class="text-4xl font-black mb-2 text-indigo-400">ברוכים הבאים</h1>
            <input type="text" id="player-name-input" placeholder="הזינו שם מלא" class="w-full text-center p-4 bg-slate-700 border-2 border-slate-600 rounded-2xl mb-4 text-white outline-none focus:border-indigo-400 transition">
            <button onclick="joinGame()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg transition">היכנס למשחק</button>
        </div>
    </div>

    <div id="screen-lobby" class="hidden flex flex-col min-h-screen">
        <header class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
            <div class="font-bold">שלום, <span id="display-name" class="text-indigo-400"></span></div>
            <div class="bg-indigo-900/40 px-4 py-1 rounded-full border border-indigo-500">ניקוד: <span id="display-score">0</span></div>
        </header>
        <main class="flex-1 p-6 flex flex-col items-center justify-center">
            <div id="stages-grid" class="grid grid-cols-2 gap-4 w-full max-w-md"></div>
        </main>
    </div>

    <div id="screen-game" class="hidden flex flex-col min-h-screen relative">
        <header class="bg-slate-800 p-4 flex justify-between items-center">
            <div id="q-progress">שאלה 1/5</div>
            <div class="text-2xl font-black text-indigo-300">⏱️ <span id="timer-num">20</span></div>
            <button onclick="showScreen('lobby')" class="text-slate-500">✖️</button>
        </header>
        <div class="h-2 w-full bg-slate-700"><div id="timer-bar" class="h-full bg-indigo-500 transition-all duration-1000 ease-linear" style="width:100%"></div></div>
        <div class="flex-1 flex items-center justify-center p-6 text-center">
            <h2 id="question-text" class="text-3xl font-black"></h2>
        </div>
        <div id="options-grid" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full mb-8"></div>
    </div>

    <div id="screen-leaderboard" class="hidden flex flex-col min-h-screen p-6 items-center justify-center">
        <h2 class="text-4xl font-black mb-8">טבלת המובילים 🏆</h2>
        <div class="bg-slate-800 w-full max-w-2xl rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-right"><tbody id="leaderboard-body" class="divide-y divide-slate-700"></tbody></table>
        </div>
        <button onclick="nextStep()" class="mt-8 bg-indigo-600 px-12 py-4 rounded-full font-black text-xl hover:bg-indigo-500 shadow-xl transition">המשך</button>
    </div>

    <div id="screen-adminLogin" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 w-full max-w-sm">
            <input type="password" id="admin-pass" placeholder="סיסמה (1234)" class="w-full p-4 bg-slate-700 rounded-xl mb-4 text-center border border-slate-600 outline-none">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">כניסה</button>
        </div>
    </div>

    <div id="screen-adminDashboard" class="hidden flex flex-col min-h-screen p-6 bg-slate-900">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-xl font-bold text-indigo-400">פאנל ניהול</h1>
            <button onclick="showScreen('login')" class="bg-slate-700 px-3 py-1 rounded text-sm">יציאה</button>
        </header>
        <div class="grid md:grid-cols-2 gap-6 overflow-y-auto">
            <div id="admin-toggles" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4"></div>
            <div id="admin-questions" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6YSQUpGpU8csuqol0ZX9uvh_GKDTol_Q",
            authDomain: "quizzinfo.firebaseapp.com",
            projectId: "quizzinfo",
            storageBucket: "quizzinfo.firebasestorage.app",
            messagingSenderId: "941264094079",
            appId: "1:941264094079:web:d526857756987ca108504a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null, myData = { score: 0, completedStages: [] }, allQuestions = [], gameSettings = {};
        let currentStage = null, currentQIndex = 0, timer = 20, timerId = null;

        window.showScreen = (id) => {
            document.querySelectorAll('body > div[id^="screen-"]').forEach(d => d.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        };

        async function init() {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    user = u;
                    setupListeners();
                    const saved = localStorage.getItem('quiz_name');
                    if (saved) {
                        const d = await getDoc(doc(db, "players", user.uid));
                        if (d.exists()) { myData = d.data(); showScreen('lobby'); }
                    }
                }
            });
        }

        function setupListeners() {
            onSnapshot(doc(db, "settings", "game_state"), (s) => {
                if (s.exists()) { gameSettings = s.data(); renderStages(); renderAdminToggles(); }
                else { setDoc(doc(db, "settings", "game_state"), { stage1:true, stage2:false, stage3:false, stage4:false }); }
            });
            onSnapshot(doc(db, "content", "questions"), (s) => {
                if (s.exists()) { allQuestions = s.data().list; renderAdminQuestions(); }
                else { seedData(); }
            });
            onSnapshot(doc(db, "players", user.uid), (s) => { if (s.exists()) { myData = s.data(); updateLobbyUI(); } });
        }

        async function seedData() {
            const list = [];
            for(let s=1; s<=4; s++) for(let q=1; q<=5; q++) 
                list.push({ stage: s, text: `שאלה ${q} שלב ${s}`, options: ["א", "ב", "ג", "ד"], correct: 0 });
            await setDoc(doc(db, "content", "questions"), { list });
        }

        window.joinGame = async () => {
            const name = document.getElementById('player-name-input').value.trim();
            if (!name) return;
            myData = { name, score: 0, completedStages: [] };
            await setDoc(doc(db, "players", user.uid), myData);
            localStorage.setItem('quiz_name', name);
            showScreen('lobby');
        };

        function updateLobbyUI() {
            document.getElementById('display-name').innerText = myData.name || '';
            document.getElementById('display-score').innerText = myData.score || 0;
        }

        function renderStages() {
            const grid = document.getElementById('stages-grid'); grid.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const isOpen = gameSettings[`stage${i}`], isDone = myData.completedStages?.includes(i);
                const btn = document.createElement('button');
                btn.className = `p-6 rounded-2xl border-2 transition font-bold ${isDone ? 'bg-emerald-900/30 border-emerald-500' : isOpen ? 'bg-indigo-900/30 border-indigo-500' : 'bg-slate-800 border-slate-700 opacity-50 cursor-not-allowed'}`;
                btn.innerHTML = `שלב ${i}<br><span class="text-xs">${isDone ? '✅ הושלם' : isOpen ? '🔓 פתוח' : '🔒 נעול'}</span>`;
                if (isOpen && !isDone) btn.onclick = () => { currentStage = i; currentQIndex = 0; showScreen('game'); loadQuestion(); };
                grid.appendChild(btn);
            }
        }

        function loadQuestion() {
            clearInterval(timerId);
            const stageQs = allQuestions.filter(q => q.stage == currentStage);
            if (!stageQs[currentQIndex]) return finishStage();
            const q = stageQs[currentQIndex];
            document.getElementById('q-progress').innerText = `שאלה ${currentQIndex + 1}/5`;
            document.getElementById('question-text').innerText = q.text;
            const grid = document.getElementById('options-grid'); grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "p-4 rounded-xl bg-slate-800 border border-slate-600 hover:bg-slate-700 font-bold transition";
                b.innerText = opt; b.onclick = () => checkAnswer(i, q.correct);
                grid.appendChild(b);
            });
            timer = 20; updateTimerUI();
            timerId = setInterval(() => { timer--; updateTimerUI(); if (timer <= 0) checkAnswer(-1, q.correct); }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-num').innerText = timer;
            document.getElementById('timer-bar').style.width = `${(timer / 20) * 100}%`;
        }

        async function checkAnswer(idx, correct) {
            clearInterval(timerId);
            if (idx === correct) {
                myData.score += (1000 + (timer * 50));
                await updateDoc(doc(db, "players", user.uid), { score: myData.score });
            }
            showLeaderboard();
        }

        async function showLeaderboard() {
            const qSnap = await getDocs(query(collection(db, "players"), orderBy("score", "desc"), limit(5)));
            const body = document.getElementById('leaderboard-body'); body.innerHTML = '';
            let rank = 1;
            qSnap.forEach(d => {
                const p = d.data();
                body.innerHTML += `<tr class="p-4 ${d.id===user.uid?'text-indigo-400':''}">
                    <td class="p-4 font-bold">${rank++}</td><td class="p-4">${p.name}</td><td class="p-4 font-mono">${p.score}</td>
                </tr>`;
            });
            showScreen('leaderboard');
        }

        window.nextStep = () => {
            currentQIndex++;
            const stageQs = allQuestions.filter(q => q.stage == currentStage);
            if (currentQIndex < stageQs.length) loadQuestion(); else finishStage();
        };

        async function finishStage() {
            if (!myData.completedStages.includes(currentStage)) {
                myData.completedStages.push(currentStage);
                await updateDoc(doc(db, "players", user.uid), { completedStages: myData.completedStages });
            }
            showScreen('lobby');
        }

        window.loginAdmin = () => { if (document.getElementById('admin-pass').value === "1234") showScreen('adminDashboard'); };

        function renderAdminToggles() {
            const cont = document.getElementById('admin-toggles'); cont.innerHTML = '<h3 class="font-bold border-b border-slate-700 pb-2">פתיחת שלבים</h3>';
            for (let i = 1; i <= 4; i++) {
                cont.innerHTML += `<div class="flex justify-between items-center bg-slate-700 p-2 rounded">
                    <span>שלב ${i}</span><input type="checkbox" ${gameSettings[`stage${i}`]?'checked':''} onchange="toggleStage(${i}, this.checked)">
                </div>`;
            }
        }
        window.toggleStage = async (n, v) => { gameSettings[`stage${n}`] = v; await setDoc(doc(db, "settings", "game_state"), gameSettings); };

        function renderAdminQuestions() {
            const cont = document.getElementById('admin-questions'); cont.innerHTML = '<h3 class="font-bold border-b border-slate-700 pb-2">עריכת שאלות</h3>';
            allQuestions.slice(0, 10).forEach((q, i) => {
                cont.innerHTML += `<div class="text-xs bg-slate-700 p-2 rounded">
                    <input class="w-full bg-slate-800 p-1 mb-1" value="${q.text}" onchange="updateQ(${i}, this.value)">
                </div>`;
            });
        }
        window.updateQ = async (i, v) => { allQuestions[i].text = v; await setDoc(doc(db, "content", "questions"), { list: allQuestions }); };

        init();
    </script>
</body>
</html>
