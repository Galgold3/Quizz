<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון טריוויה - IGS Skillhub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // הגדרות ה-Firebase האמיתיות שלך
        const firebaseConfig = {
            apiKey: "AIzaSyC6YSQUpGpU8csuqol0ZX9uvh_GKDTol_Q",
            authDomain: "quizzinfo.firebaseapp.com",
            projectId: "quizzinfo",
            storageBucket: "quizzinfo.firebasestorage.app",
            messagingSenderId: "941264094079",
            appId: "1:941264094079:web:d526857756987ca108504a",
            measurementId: "G-G72Q3BKYXE"
        };

        const appId = 'skillhub-main-quiz'; // מזהה קבוע למסד הנתונים

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global State
        let currentUser = null;
        let myPlayerData = { score: 0, completedStages: [] };
        let players = [];
        let settings = { stage1: true, stage2: false, stage3: false, stage4: false };
        let allQuestions = [];
        
        let currentStageId = null;
        let stageQuestions = [];
        let currentQuestionIndex = 0;
        let scoreCounter = 0;
        let timerInterval = null;
        let timeLeft = 0;

        // נתיבים במסד הנתונים
        const playersPath = () => collection(db, 'quizzes', appId, 'players');
        const settingsDocPath = () => doc(db, 'quizzes', appId, 'settings', 'game_state');
        const questionsDocPath = () => doc(db, 'quizzes', appId, 'content', 'all_questions');

        const screens = {
            login: document.getElementById('screen-login'),
            lobby: document.getElementById('screen-lobby'),
            game: document.getElementById('screen-game'),
            leaderboard: document.getElementById('screen-leaderboard'),
            adminLogin: document.getElementById('screen-admin-login'),
            adminDashboard: document.getElementById('screen-admin-dashboard')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        async function init() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth Error:", err);
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    setupRealtimeListeners();
                    await checkUserExists();
                }
            });
        }

        async function checkUserExists() {
            if (!currentUser) return;
            const userDoc = await getDoc(doc(playersPath(), currentUser.uid));
            if (userDoc.exists()) {
                myPlayerData = userDoc.data();
                scoreCounter = myPlayerData.score || 0;
                document.getElementById('player-name-display').innerText = myPlayerData.name;
                showScreen('lobby');
                renderLobby();
            } else {
                showScreen('login');
            }
        }

        function setupRealtimeListeners() {
            if (!currentUser) return;

            onSnapshot(playersPath(), (snap) => {
                players = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                const me = players.find(p => p.uid === currentUser?.uid);
                if (me) myPlayerData = me;
                renderLeaderboardUI();
                if (!screens.lobby.classList.contains('hidden')) renderLobby();
            });

            onSnapshot(settingsDocPath(), (docSnap) => {
                if (docSnap.exists()) settings = docSnap.data();
                else setDoc(settingsDocPath(), settings);
                if (!screens.lobby.classList.contains('hidden')) renderLobby();
                renderAdminSettings();
            });

            onSnapshot(questionsDocPath(), (docSnap) => {
                if (docSnap.exists()) allQuestions = docSnap.data().questions || [];
                else seedDefaultQuestions();
                renderAdminQuestions();
            });
        }

        async function seedDefaultQuestions() {
            const defaultQs = [];
            for (let s = 1; s <= 4; s++) {
                for (let q = 1; q <= 5; q++) {
                    defaultQs.push({
                        id: `s${s}q${q}`, stage: s,
                        text: `שאלה ${q} - שלב ${s} (ערוך אותי)`,
                        options: ["תשובה א", "תשובה ב", "תשובה ג", "תשובה ד"],
                        correctIndex: 0, timeLimit: 20
                    });
                }
            }
            await setDoc(questionsDocPath(), { questions: defaultQs });
        }

        window.joinGame = async () => {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) return showMessage("נא להזין שם", "error");
            
            myPlayerData = { name: nameInput, score: 0, completedStages: [] };
            await setDoc(doc(playersPath(), currentUser.uid), myPlayerData);
            document.getElementById('player-name-display').innerText = nameInput;
            showScreen('lobby');
        };

        function renderLobby() {
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById(`stage-btn-${i}`);
                if (btn) {
                    const isOpen = settings[`stage${i}`], isDone = myPlayerData.completedStages?.includes(i);
                    btn.className = `relative aspect-square rounded-2xl border-2 transition-all p-4 flex flex-col items-center justify-center ${
                        isDone ? 'bg-green-900/20 border-green-500 opacity-60' : 
                        isOpen ? 'bg-slate-800 border-indigo-500 hover:scale-105 shadow-lg' : 'bg-slate-900 border-gray-700 opacity-50 cursor-not-allowed'
                    }`;
                    btn.querySelector('.lock-icon').classList.toggle('hidden', isOpen || isDone);
                    btn.querySelector('.check-icon').classList.toggle('hidden', !isDone);
                }
            }
            document.getElementById('lobby-total-score').innerText = myPlayerData.score || 0;
        }

        window.attemptStage = (num) => {
            if (myPlayerData.completedStages?.includes(num)) return showMessage('כבר סיימת!', 'success');
            if (!settings[`stage${num}`]) return showMessage('השלב נעול', 'warning');
            currentStageId = num;
            stageQuestions = allQuestions.filter(q => q.stage == num);
            currentQuestionIndex = 0;
            showScreen('game');
            loadQuestion();
        };

        function loadQuestion() {
            clearInterval(timerInterval);
            const q = stageQuestions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `שאלה ${currentQuestionIndex + 1}/${stageQuestions.length}`;
            document.getElementById('question-text').innerText = q.text;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-6 rounded-xl bg-slate-800 border-2 border-indigo-500/30 font-bold hover:bg-slate-700 transition";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i, q.correctIndex);
                container.appendChild(btn);
            });

            timeLeft = q.timeLimit || 20;
            updateTimerUI();
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerUI();
                if (timeLeft <= 0) { clearInterval(timerInterval); handleAnswer(-1, q.correctIndex); }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timeLeft;
            document.getElementById('timer-bar').style.width = `${(timeLeft/20)*100}%`;
        }

        async function handleAnswer(idx, correct) {
            clearInterval(timerInterval);
            const isCorrect = idx === correct;
            if (isCorrect) scoreCounter += (1000 + timeLeft * 50);
            
            const msg = document.getElementById('feedback-message');
            msg.innerText = isCorrect ? "נכון!" : (idx === -1 ? "נגמר הזמן" : "טעות!");
            msg.className = `fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-black p-8 rounded-2xl shadow-2xl z-50 ${isCorrect ? 'bg-green-600' : 'bg-red-600'}`;
            msg.classList.remove('hidden');

            await updateDoc(doc(playersPath(), currentUser.uid), { score: scoreCounter });

            setTimeout(() => {
                msg.classList.add('hidden');
                showScreen('leaderboard');
                renderLeaderboardUI();
            }, 2000);
        }

        window.nextAction = async () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < stageQuestions.length) {
                showScreen('game'); loadQuestion();
            } else {
                if (!myPlayerData.completedStages.includes(currentStageId)) {
                    myPlayerData.completedStages.push(currentStageId);
                    await updateDoc(doc(playersPath(), currentUser.uid), { completedStages: myPlayerData.completedStages });
                }
                showScreen('lobby');
            }
        };

        function renderLeaderboardUI() {
            const sorted = [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0,5);
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = sorted.map((p, i) => `
                <tr class="border-b border-gray-700 ${p.uid === currentUser.uid ? 'bg-indigo-900/20' : ''}">
                    <td class="p-4 text-center font-bold">${i+1}</td>
                    <td class="p-4">${p.name}</td>
                    <td class="p-4 text-left text-indigo-400 font-mono">${p.score}</td>
                </tr>`).join('');
            document.getElementById('my-current-score').innerText = scoreCounter;
        }

        // Admin Actions
        window.loginAdmin = () => {
            if (document.getElementById('admin-password').value === "1234") {
                showScreen('adminDashboard');
                renderAdminSettings();
            } else showMessage("סיסמה שגויה", "error");
        };

        window.updateStageSetting = async (num, val) => {
            settings[`stage${num}`] = val;
            await setDoc(settingsDocPath(), settings);
        };

        function renderAdminSettings() {
            for(let i=1; i<=4; i++) document.getElementById(`toggle-s${i}`).checked = settings[`stage${i}`];
        }

        function renderAdminQuestions() {
            const cont = document.getElementById('admin-questions-list');
            cont.innerHTML = allQuestions.map((q, i) => `
                <div class="bg-gray-700 p-4 rounded mb-2 border border-gray-600">
                    <input type="text" value="${q.text}" onchange="updateQ(${i}, this.value)" class="w-full bg-gray-800 p-2 rounded border border-gray-500">
                </div>`).join('');
        }

        window.updateQ = async (i, val) => {
            allQuestions[i].text = val;
            await setDoc(questionsDocPath(), { questions: allQuestions });
        };

        function showMessage(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold z-[100] ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div id="toast" class="hidden"></div>

    <div id="screen-login" class="h-screen flex flex-col items-center justify-center p-4">
        <button onclick="showScreen('adminLogin')" class="absolute top-4 left-4 text-gray-600">⚙️</button>
        <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-700">
            <h1 class="text-4xl font-black mb-2 text-indigo-400">טריוויה Skillhub</h1>
            <input type="text" id="player-name" placeholder="הזינו שם מלא" class="w-full text-center p-4 bg-gray-700 border-2 border-gray-600 rounded-xl mb-4 text-white outline-none focus:border-indigo-400">
            <button onclick="joinGame()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition">היכנס למשחק</button>
        </div>
    </div>

    <div id="screen-lobby" class="hidden h-screen flex flex-col">
        <header class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
            <div>שלום, <span id="player-name-display" class="font-bold text-indigo-400"></span></div>
            <div class="bg-indigo-900/30 px-4 py-1 rounded-full border border-indigo-500">ניקוד: <span id="lobby-total-score">0</span></div>
        </header>
        <main class="flex-1 p-6 flex flex-col items-center justify-center">
            <div class="grid grid-cols-2 gap-4 w-full max-w-md">
                <button id="stage-btn-1" onclick="attemptStage(1)"><span class="lock-icon">🔒</span><span class="check-icon hidden">✅</span><br>שלב 1</button>
                <button id="stage-btn-2" onclick="attemptStage(2)"><span class="lock-icon">🔒</span><span class="check-icon hidden">✅</span><br>שלב 2</button>
                <button id="stage-btn-3" onclick="attemptStage(3)"><span class="lock-icon">🔒</span><span class="check-icon hidden">✅</span><br>שלב 3</button>
                <button id="stage-btn-4" onclick="attemptStage(4)"><span class="lock-icon">🔒</span><span class="check-icon hidden">✅</span><br>שלב 4</button>
            </div>
        </main>
    </div>

    <div id="screen-game" class="hidden h-screen flex flex-col relative">
        <div id="feedback-message" class="hidden"></div>
        <header class="bg-gray-800 p-4 flex justify-between items-center">
            <div id="question-number"></div>
            <div class="text-2xl font-black text-indigo-300">⏱️ <span id="timer-text">20</span></div>
            <button onclick="showScreen('lobby')">✖️</button>
        </header>
        <div class="h-2 w-full bg-gray-700"><div id="timer-bar" class="h-full bg-indigo-500 transition-all duration-1000 ease-linear" style="width:100%"></div></div>
        <div class="flex-1 flex items-center justify-center p-6 text-center">
            <h2 id="question-text" class="text-3xl font-black"></h2>
        </div>
        <div id="options-container" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full mb-8"></div>
    </div>

    <div id="screen-leaderboard" class="hidden h-screen flex flex-col p-6 items-center justify-center">
        <h2 class="text-4xl font-black mb-8">טבלת מובילים 🏆</h2>
        <div class="bg-gray-800 w-full max-w-xl rounded-2xl overflow-hidden border border-gray-700 shadow-2xl">
            <table class="w-full text-right"><tbody id="leaderboard-body"></tbody></table>
            <div class="p-4 bg-gray-700 text-center font-bold">הניקוד שלי: <span id="my-current-score" class="text-indigo-400">0</span></div>
        </div>
        <button onclick="nextAction()" class="mt-8 bg-indigo-600 px-12 py-4 rounded-full font-bold text-xl hover:bg-indigo-500 transition">המשך</button>
    </div>

    <div id="screen-admin-login" class="hidden h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 w-full max-w-sm">
            <input type="password" id="admin-password" placeholder="סיסמה (1234)" class="w-full p-4 bg-gray-700 rounded mb-4 text-center">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 py-3 rounded font-bold">כניסה</button>
        </div>
    </div>

    <div id="screen-admin-dashboard" class="hidden h-screen flex flex-col p-6 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-4 text-indigo-400">ניהול שלבים</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="flex justify-between p-2 bg-gray-800 rounded">שלב 1 <input type="checkbox" id="toggle-s1" onchange="updateStageSetting(1, this.checked)"></div>
            <div class="flex justify-between p-2 bg-gray-800 rounded">שלב 2 <input type="checkbox" id="toggle-s2" onchange="updateStageSetting(2, this.checked)"></div>
            <div class="flex justify-between p-2 bg-gray-800 rounded">שלב 3 <input type="checkbox" id="toggle-s3" onchange="updateStageSetting(3, this.checked)"></div>
            <div class="flex justify-between p-2 bg-gray-800 rounded">שלב 4 <input type="checkbox" id="toggle-s4" onchange="updateStageSetting(4, this.checked)"></div>
        </div>
        <h2 class="text-2xl font-bold mb-4 text-indigo-400">עריכת שאלות</h2>
        <div id="admin-questions-list"></div>
    </div>
</body>
</html>
