<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון טריוויה - Skillhub</title>
    
    <!-- Google Fonts: Heebo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Heebo', sans-serif; overflow-x: hidden; }
        .answer-btn:disabled { cursor: not-allowed; opacity: 0.6; }
        .stage-card:hover:not(.opacity-50) { transform: translateY(-5px); }
        .timer-low { background-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <!-- מסך כניסה -->
    <div id="screen-login" class="flex flex-col items-center justify-center min-h-screen p-4">
        <button onclick="showScreen('adminLogin')" class="absolute top-4 left-4 text-slate-700 hover:text-slate-400">⚙️</button>
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700 text-center">
            <h1 class="text-4xl font-black mb-2 text-indigo-400">ברוכים הבאים</h1>
            <p class="text-slate-400 mb-8 font-light">הזינו שם כדי להתחיל בצבירת נקודות</p>
            <input type="text" id="player-name-input" placeholder="שם מלא / כינוי" class="w-full text-center p-4 bg-slate-700 border-2 border-slate-600 rounded-2xl mb-4 text-white focus:border-indigo-400 outline-none transition">
            <button onclick="joinGame()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg transition transform active:scale-95">היכנס למשחק</button>
        </div>
    </div>

    <!-- מסך לובי -->
    <div id="screen-lobby" class="hidden flex flex-col min-h-screen">
        <header class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center sticky top-0 z-50">
            <div class="font-bold">שלום, <span id="display-name" class="text-indigo-400"></span></div>
            <div class="bg-indigo-900/40 px-4 py-1 rounded-full border border-indigo-500 text-indigo-200 shadow-inner">
                ניקוד מצטבר: <span id="display-score" class="font-mono font-bold">0</span>
            </div>
        </header>
        <main class="flex-1 p-6 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold mb-8 text-center">בחרו שלב למשחק:</h2>
            <div id="stages-grid" class="grid grid-cols-2 gap-4 w-full max-w-md text-center">
                <!-- השלבים יוזרקו לכאן -->
            </div>
        </main>
    </div>

    <!-- מסך משחק -->
    <div id="screen-game" class="hidden flex flex-col min-h-screen relative">
        <div id="feedback-msg" class="hidden fixed inset-0 flex items-center justify-center z-50 pointer-events-none">
            <div id="feedback-content" class="text-6xl font-black px-10 py-5 rounded-2xl shadow-2xl transform scale-150 animate-bounce"></div>
        </div>
        
        <header class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700">
            <div id="q-progress" class="text-slate-400 font-medium">שאלה 1/5</div>
            <div class="text-2xl font-black text-indigo-300">⏱️ <span id="timer-num">20</span></div>
            <button onclick="showScreen('lobby')" class="text-slate-500 hover:text-white transition">✖️</button>
        </header>
        
        <div class="h-2 w-full bg-slate-700">
            <div id="timer-bar" class="h-full bg-indigo-500 transition-all duration-1000 ease-linear" style="width: 100%;"></div>
        </div>

        <div class="flex-1 flex items-center justify-center p-6 text-center">
            <h2 id="question-text" class="text-3xl md:text-5xl font-black leading-tight drop-shadow-lg">טוען שאלה...</h2>
        </div>

        <div id="options-grid" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full mb-8">
            <!-- כפתורים יוזרקו כאן -->
        </div>
    </div>

    <!-- טבלת מובילים -->
    <div id="screen-leaderboard" class="hidden flex flex-col min-h-screen p-6 items-center justify-center">
        <h2 class="text-4xl font-black mb-8 text-center">טבלת המובילים 🏆</h2>
        <div class="bg-slate-800 w-full max-w-2xl rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-right">
                <thead class="bg-slate-700 text-slate-300">
                    <tr>
                        <th class="p-4">מקום</th>
                        <th class="p-4">שם</th>
                        <th class="p-4 text-left">ניקוד</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="divide-y divide-slate-700">
                    <!-- נתונים יוזרקו כאן -->
                </tbody>
            </table>
        </div>
        <button onclick="nextStep()" class="mt-8 bg-indigo-600 px-12 py-4 rounded-full font-black text-xl hover:bg-indigo-500 shadow-xl transition transform active:scale-95">המשך</button>
    </div>

    <!-- ניהול (Admin) -->
    <div id="screen-adminLogin" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">כניסת מנהל</h2>
            <input type="password" id="admin-pass" placeholder="סיסמה (1234)" class="w-full p-4 bg-slate-700 rounded-xl mb-4 text-center border border-slate-600 focus:border-indigo-400 outline-none">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold mb-2">כניסה</button>
            <button onclick="showScreen('login')" class="text-slate-500 text-sm">חזרה</button>
        </div>
    </div>

    <div id="screen-adminDashboard" class="hidden flex flex-col min-h-screen p-6 bg-slate-900 overflow-y-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold text-indigo-400">פאנל ניהול ⚙️</h1>
            <div class="flex gap-2">
                <button onclick="resetAllScores()" class="bg-red-900/50 text-red-100 border border-red-700 px-3 py-1 rounded text-sm font-bold">איפוס ניקוד</button>
                <button onclick="showScreen('login')" class="bg-slate-700 px-3 py-1 rounded text-sm hover:bg-slate-600 transition">יציאה</button>
            </div>
        </header>
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 h-fit">
                <h3 class="font-bold mb-4 text-indigo-300 border-b border-slate-700 pb-2">בקרת שלבים</h3>
                <div id="admin-toggles" class="space-y-4"></div>
            </div>
            <div class="md:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h3 class="font-bold mb-4 text-indigo-300 border-b border-slate-700 pb-2">עריכת תוכן (10 שאלות אחרונות)</h3>
                <div id="admin-questions" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6YSQUpGpU8csuqol0ZX9uvh_GKDTol_Q",
            authDomain: "quizzinfo.firebaseapp.com",
            projectId: "quizzinfo",
            storageBucket: "quizzinfo.firebasestorage.app",
            messagingSenderId: "941264094079",
            appId: "1:941264094079:web:d526857756987ca108504a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null, myData = { name: '', score: 0, completedStages: [] };
        let allQuestions = [], gameSettings = { stage1: true, stage2: false, stage3: false, stage4: false };
        let currentStage = null, currentQIndex = 0, timer = 20, timerId = null;

        window.showScreen = (id) => {
            document.querySelectorAll('body > div[id^="screen-"]').forEach(d => d.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
            if(id === 'lobby') renderStages();
        };

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        user = u;
                        setupListeners();
                        const savedName = localStorage.getItem('quiz_name');
                        if (savedName) {
                            const userDoc = await getDoc(doc(db, "players", user.uid));
                            if (userDoc.exists()) {
                                myData = userDoc.data();
                                showScreen('lobby');
                            }
                        }
                    }
                });
            } catch(e) { console.error("Firebase Auth Error", e); }
        }

        function setupListeners() {
            onSnapshot(doc(db, "settings", "game_state"), (snap) => {
                if (snap.exists()) {
                    gameSettings = snap.data();
                    renderStages();
                    renderAdminToggles();
                } else {
                    setDoc(doc(db, "settings", "game_state"), gameSettings);
                }
            });

            onSnapshot(doc(db, "content", "questions"), (snap) => {
                if (snap.exists()) {
                    allQuestions = snap.data().list;
                    renderAdminQuestions();
                } else {
                    seedData();
                }
            });

            onSnapshot(doc(db, "players", user.uid), (snap) => {
                if (snap.exists()) {
                    myData = snap.data();
                    document.getElementById('display-name').innerText = myData.name;
                    document.getElementById('display-score').innerText = myData.score;
                }
            });
        }

        async function seedData() {
            const list = [];
            for(let s=1; s<=4; s++) {
                for(let q=1; q<=5; q++) {
                    list.push({ stage: s, text: `שאלה ${q} שלב ${s} (עריכה בניהול)`, options: ["תשובה א", "תשובה ב", "תשובה ג", "תשובה ד"], correct: 0 });
                }
            }
            await setDoc(doc(db, "content", "questions"), { list });
        }

        window.joinGame = async () => {
            const input = document.getElementById('player-name-input');
            const name = input.value.trim();
            if (!name) return alert("נא להזין שם");
            myData = { name, score: 0, completedStages: [] };
            await setDoc(doc(db, "players", user.uid), myData);
            localStorage.setItem('quiz_name', name);
            showScreen('lobby');
        };

        function renderStages() {
            const grid = document.getElementById('stages-grid');
            if(!grid) return;
            grid.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const isOpen = gameSettings[`stage${i}`];
                const isDone = myData.completedStages?.includes(i);
                const btn = document.createElement('button');
                btn.className = `stage-card p-6 rounded-2xl border-2 transition font-bold flex flex-col items-center justify-center gap-2 ${
                    isDone ? 'bg-emerald-900/30 border-emerald-500 text-emerald-300' :
                    isOpen ? 'bg-indigo-900/30 border-indigo-500 hover:bg-indigo-900/50' : 'bg-slate-800 border-slate-700 opacity-50 cursor-not-allowed'
                }`;
                btn.innerHTML = `<span>שלב ${i}</span><span class="text-xs">${isDone ? '✅ הושלם' : isOpen ? '🔓 פתוח' : '🔒 נעול'}</span>`;
                if (isOpen && !isDone) btn.onclick = () => { currentStage = i; currentQIndex = 0; showScreen('game'); loadQuestion(); };
                grid.appendChild(btn);
            }
        }

        function loadQuestion() {
            clearInterval(timerId);
            const stageQs = allQuestions.filter(q => q.stage == currentStage);
            if (!stageQs[currentQIndex]) return finishStage();

            const q = stageQs[currentQIndex];
            document.getElementById('q-progress').innerText = `שאלה ${currentQIndex + 1}/5`;
            document.getElementById('question-text').innerText = q.text;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            const borderColors = ['border-rose-500/40', 'border-blue-500/40', 'border-amber-500/40', 'border-emerald-500/40'];
            
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = `answer-btn p-5 rounded-2xl bg-slate-800 border-2 text-xl font-bold transition hover:bg-slate-700 ${borderColors[i]}`;
                b.innerText = opt;
                b.onclick = () => checkAnswer(i, q.correct);
                grid.appendChild(b);
            });

            timer = 20;
            updateTimerUI();
            timerId = setInterval(() => {
                timer--;
                updateTimerUI();
                if (timer <= 0) { clearInterval(timerId); checkAnswer(-1, q.correct); }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-num').innerText = timer;
            const bar = document.getElementById('timer-bar');
            bar.style.width = `${(timer / 20) * 100}%`;
            if(timer < 6) bar.classList.add('timer-low'); else bar.classList.remove('timer-low');
        }

        async function checkAnswer(idx, correct) {
            clearInterval(timerId);
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);

            const isCorrect = idx === correct;
            const feedback = document.getElementById('feedback-msg');
            const content = document.getElementById('feedback-content');
            
            if (isCorrect) {
                const bonus = 1000 + (timer * 50);
                myData.score += bonus;
                content.innerText = `+${bonus}`;
                content.className = "text-6xl font-black px-10 py-5 rounded-2xl shadow-2xl animate-bounce bg-emerald-600 text-white";
                await updateDoc(doc(db, "players", user.uid), { score: myData.score });
            } else {
                content.innerText = idx === -1 ? "נגמר הזמן!" : "טעות!";
                content.className = "text-6xl font-black px-10 py-5 rounded-2xl shadow-2xl animate-pulse bg-rose-600 text-white";
            }

            feedback.classList.remove('hidden');
            setTimeout(() => {
                feedback.classList.add('hidden');
                showLeaderboard();
            }, 2000);
        }

        async function showLeaderboard() {
            const qSnap = await getDocs(query(collection(db, "players"), orderBy("score", "desc"), limit(5)));
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = '';
            let rank = 1;
            qSnap.forEach(d => {
                const p = d.data();
                const isMe = d.id === user.uid;
                body.innerHTML += `<tr class="${isMe ? 'bg-indigo-900/30' : ''}">
                    <td class="p-4 font-bold text-slate-400">${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</td>
                    <td class="p-4 font-bold">${p.name} ${isMe ? '(אתה)' : ''}</td>
                    <td class="p-4 font-mono text-indigo-400 font-bold text-left">${p.score.toLocaleString()}</td>
                </tr>`;
                rank++;
            });
            showScreen('leaderboard');
        }

        window.nextStep = () => {
            currentQIndex++;
            const stageQs = allQuestions.filter(q => q.stage == currentStage);
            if (currentQIndex < stageQs.length) loadQuestion(); else finishStage();
        };

        async function finishStage() {
            if (!myData.completedStages.includes(currentStage)) {
                myData.completedStages.push(currentStage);
                await updateDoc(doc(db, "players", user.uid), { completedStages: myData.completedStages });
            }
            alert(`כל הכבוד! סיימת את שלב ${currentStage}`);
            showScreen('lobby');
        }

        window.loginAdmin = () => {
            const p = document.getElementById('admin-pass').value;
            if (p === "1234" || p === "admin123") showScreen('adminDashboard');
            else alert("סיסמה שגויה");
        };

        function renderAdminToggles() {
            const cont = document.getElementById('admin-toggles');
            cont.innerHTML = '<h3 class="font-bold mb-4 text-indigo-300 border-b border-slate-700 pb-2">בקרת שלבים</h3>';
            for (let i = 1; i <= 4; i++) {
                const active = gameSettings[`stage${i}`];
                cont.innerHTML += `<div class="flex justify-between items-center p-3 bg-slate-700/50 rounded-xl border border-slate-600">
                    <span>שלב ${i}</span>
                    <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleStage(${i}, this.checked)" class="w-6 h-6 accent-indigo-500 cursor-pointer">
                </div>`;
            }
        }

        window.toggleStage = async (n, v) => {
            gameSettings[`stage${n}`] = v;
            await setDoc(doc(db, "settings", "game_state"), gameSettings);
        };

        function renderAdminQuestions() {
            const cont = document.getElementById('admin-questions');
            cont.innerHTML = '';
            allQuestions.slice(0, 10).forEach((q, i) => {
                cont.innerHTML += `<div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 mb-4">
                    <div class="text-xs text-indigo-300 mb-2 uppercase">שלב ${q.stage} | שאלה ${i+1}</div>
                    <input value="${q.text}" onchange="updateQ(${i}, 'text', this.value)" class="w-full bg-slate-800 p-2 rounded-lg border border-slate-600 mb-2 outline-none focus:border-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        ${q.options.map((opt, oi) => `<input value="${opt}" onchange="updateQOpt(${i}, ${oi}, this.value)" class="bg-slate-800 p-2 rounded text-sm border border-slate-600 outline-none focus:border-indigo-400">`).join('')}
                    </div>
                </div>`;
            });
        }

        window.updateQ = async (i, f, v) => {
            allQuestions[i][f] = v;
            await setDoc(doc(db, "content", "questions"), { list: allQuestions });
        };

        window.updateQOpt = async (i, oi, v) => {
            allQuestions[i].options[oi] = v;
            await setDoc(doc(db, "content", "questions"), { list: allQuestions });
        };

        window.resetAllScores = async () => {
            if (!confirm("לאפס תוצאות לכל השחקנים?")) return;
            const s = await getDocs(collection(db, "players"));
            const ps = s.docs.map(d => updateDoc(doc(db, "players", d.id), { score: 0, completedStages: [] }));
            await Promise.all(ps);
            alert("התוצאות אופסו בהצלחה");
        };

        init();
    </script>
</body>
</html>
